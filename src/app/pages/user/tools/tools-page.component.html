<section class="rounded-[28px] border border-[#e6ecf4] bg-white p-5 shadow-[0_16px_40px_rgba(15,23,42,0.04)]">
  <div class="max-w-3xl">
    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-[#2A89EF]">
      Ferramentas do app
    </p>
    <h2 class="mt-2 text-3xl font-black text-slate-900">
      Configure a experiência do seu workspace
    </h2>
    <p class="mt-3 text-sm leading-6 text-slate-500">
      Essas preferências afetam sua interface real: banner inicial, compactação dos cards,
      notificações internas e rota padrão após o login.
    </p>
  </div>

  <form class="mt-8 grid gap-5" [formGroup]="preferencesForm" (ngSubmit)="onSubmit()">
    <label class="flex items-start gap-4 rounded-3xl border border-[#e6edf6] bg-[#f8fbff] p-5">
      <input formControlName="showWelcomeBanner" type="checkbox" class="mt-1 h-4 w-4" />
      <div>
        <p class="font-semibold text-slate-900">Exibir banner de boas-vindas</p>
        <p class="mt-1 text-sm text-slate-500">
          Mostra o bloco de boas-vindas na página de tarefas.
        </p>
      </div>
    </label>

    <label class="flex items-start gap-4 rounded-3xl border border-[#e6edf6] bg-[#f8fbff] p-5">
      <input formControlName="compactTaskCards" type="checkbox" class="mt-1 h-4 w-4" />
      <div>
        <p class="font-semibold text-slate-900">Ativar cards compactos</p>
        <p class="mt-1 text-sm text-slate-500">
          Reduz o conteúdo visível dos cards no board para ganhar densidade.
        </p>
      </div>
    </label>

    <label class="flex items-start gap-4 rounded-3xl border border-[#e6edf6] bg-[#f8fbff] p-5">
      <input formControlName="inAppNotifications" type="checkbox" class="mt-1 h-4 w-4" />
      <div>
        <p class="font-semibold text-slate-900">Notificações internas</p>
        <p class="mt-1 text-sm text-slate-500">
          Mantém habilitados os sinais visuais de notificações no header.
        </p>
      </div>
    </label>

    <div class="rounded-3xl border border-[#e6edf6] bg-[#f8fbff] p-5">
      <label class="mb-2 block text-sm font-semibold text-slate-700">
        Página padrão após o login
      </label>
      <select
        class="w-full rounded-2xl border border-[#d4deec] bg-white px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-[#2A89EF]"
        formControlName="defaultRoute"
      >
        <option value="/app/tarefas">Tarefas</option>
        <option value="/app/usuario/perfil">Perfil</option>
        <option value="/app/usuario/historico">Histórico</option>
      </select>
    </div>

    @if (feedbackMessage) {
      <p class="rounded-2xl bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-700">
        {{ feedbackMessage }}
      </p>
    }

    <button
      class="w-full rounded-2xl bg-[#2A89EF] px-5 py-3 text-sm font-semibold text-white shadow-[0_18px_30px_rgba(42,137,239,0.25)] transition hover:-translate-y-0.5 md:w-fit"
      type="submit"
    >
      Salvar ferramentas
    </button>
  </form>
</section>
