@let isCompact = (compactMode$ | async) ?? false;

<div class="flex cursor-grab flex-col gap-3 rounded-[22px] border border-[#e9eef5] bg-white p-4 shadow-[0_10px_30px_rgba(15,23,42,0.04)]">
  <div class="flex items-start gap-2">
    <div class="min-w-0">
      <p class="font-bold text-slate-900" [title]="task.name">
        {{ task.name.length < 20 ? task.name : (task.name | slice: 0 : 20) + "..." }}
      </p>
      <p class="mt-1 text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">
        {{ task.updatedAt | date: 'dd/MM HH:mm' }}
      </p>
    </div>
    <img
      class="ml-auto cursor-pointer self-start"
      src="images/icon-delete.svg"
      alt="Apagar tarefa"
      (click)="deleteTask()"
    />
  </div>

  @if (!isCompact) {
    <p class="text-sm font-light text-slate-600" [title]="task.description">
      {{ task.description.length < 80 ? task.description : (task.description | slice: 0 : 80) + "..." }}
    </p>
  }

  <div class="mt-auto flex items-center gap-2">
    <img src="images/icon-comments.svg" alt="" />
    <button
      class="text-xs font-semibold text-[#2A89EF] underline underline-offset-2"
      type="button"
      (click)="openCommentsModal()"
    >
      {{ task.comments.length }} Comentários
    </button>
    <button
      class="ml-auto text-xs font-semibold text-[#2A89EF] underline underline-offset-2"
      type="button"
      (click)="openEditTaskModal()"
    >
      Editar
    </button>
  </div>
</div>
