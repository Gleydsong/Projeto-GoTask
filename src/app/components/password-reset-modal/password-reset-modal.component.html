<form class="overflow-hidden rounded-[28px] bg-white" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="border-b border-[#e6edf6] px-5 py-4">
    <h2 class="text-xl font-black text-slate-900">Redefinir senha</h2>
    <p class="mt-2 text-sm text-slate-500">{{ dialogData.userName }}</p>
  </div>

  <div class="grid gap-4 px-5 py-5">
    <input class="rounded-2xl border border-[#d7e0ec] px-4 py-3 text-sm" formControlName="password" type="password" placeholder="Nova senha" />
    <input class="rounded-2xl border border-[#d7e0ec] px-4 py-3 text-sm" formControlName="confirmPassword" type="password" placeholder="Confirmar senha" />

    @if (errorMessage) {
      <p class="rounded-2xl bg-red-50 px-4 py-3 text-sm font-semibold text-red-600">
        {{ errorMessage }}
      </p>
    }
  </div>

  <div class="flex justify-end gap-3 border-t border-[#e6edf6] px-5 py-4">
    <button class="rounded-2xl border border-[#d7e0ec] px-4 py-3 text-sm font-semibold text-slate-600" type="button" (click)="closeModal()">
      Cancelar
    </button>
    <button class="rounded-2xl bg-[#2A89EF] px-4 py-3 text-sm font-semibold text-white" type="submit">
      Atualizar senha
    </button>
  </div>
</form>
